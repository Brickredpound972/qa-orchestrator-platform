swagger: '2.0'
info:
  title: QA Orchestrator API
  description: AI-powered QA decision engine. Analyzes Jira issues and returns structured QA intelligence including test cases, risk analysis, automation strategy, and release summaries.
  version: 3.0.0
host: qa-orchestrator-service.onrender.com
basePath: /
schemes:
  - https

paths:
  /qa/api/v1/qa/analyze:
    post:
      operationId: analyzeQaIssue
      summary: Analyze a Jira issue
      description: Runs the full QA pipeline for a Jira issue.
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - issueKey
            properties:
              issueKey:
                type: string
                description: Jira issue key, for example PROJ-4
      responses:
        '200':
          description: QA analysis result
          schema:
            $ref: '#/definitions/QaAnalyzeResponse'

  /qa/run/{issueKey}:
    post:
      operationId: runQaAnalysis
      summary: Run QA analysis (legacy)
      description: Legacy endpoint. Use /qa/api/v1/qa/analyze instead.
      produces:
        - application/json
      parameters:
        - name: issueKey
          in: path
          required: true
          type: string
      responses:
        '200':
          description: QA analysis result
          schema:
            $ref: '#/definitions/QaAnalyzeResponse'

  /qa/api/v1/intelligence/summary:
    get:
      operationId: getIntelligenceSummary
      summary: Get QA intelligence summary
      description: Returns aggregated intelligence across all analyses.
      produces:
        - application/json
      responses:
        '200':
          description: Intelligence summary
          schema:
            type: object
            properties:
              totalAnalyses:
                type: integer
              averageRiskScore:
                type: integer
              highRiskCount:
                type: integer
              mediumRiskCount:
                type: integer
              lowRiskCount:
                type: integer
              blockedCount:
                type: integer
              releasedCount:
                type: integer
              riskDistribution:
                type: object
              releaseDistribution:
                type: object
              mostAnalyzedIssues:
                type: array
                items:
                  type: object

  /qa/api/v1/intelligence/blocked:
    get:
      operationId: getBlockedTickets
      summary: Get blocked tickets
      description: Returns all analyses where release recommendation is Block.
      produces:
        - application/json
      responses:
        '200':
          description: Blocked analysis records
          schema:
            type: array
            items:
              $ref: '#/definitions/AnalysisRecord'

  /qa/api/v1/intelligence/released:
    get:
      operationId: getReleasedTickets
      summary: Get released tickets with QA summaries
      description: Returns all tickets marked as Done with LLM-generated QA release summary.
      produces:
        - application/json
      responses:
        '200':
          description: Released analysis records
          schema:
            type: array
            items:
              $ref: '#/definitions/AnalysisRecord'

  /qa/api/v1/intelligence/released/summary:
    get:
      operationId: getReleasedSummaryForCopilot
      summary: Get released tickets summary (Copilot-friendly)
      description: Returns released tickets in human-readable format. Use this in Copilot Studio for better formatting.
      produces:
        - application/json
      responses:
        '200':
          description: Formatted released tickets summary
          schema:
            type: object
            properties:
              count:
                type: integer
              message:
                type: string
              tickets:
                type: array
                items:
                  type: object

  /qa/api/v1/intelligence/trends:
    get:
      operationId: getRiskTrends
      summary: Get risk trends across re-analyzed issues
      description: Returns risk trend data for tickets analyzed more than once.
      produces:
        - application/json
      responses:
        '200':
          description: Risk trend data
          schema:
            type: array
            items:
              type: object
              properties:
                issueKey:
                  type: string
                avgRiskScore:
                  type: integer
                minRiskScore:
                  type: integer
                maxRiskScore:
                  type: integer
                analysisCount:
                  type: integer
                trend:
                  type: string

  /qa/api/v1/intelligence/trends/{issueKey}:
    get:
      operationId: getIssueTrend
      summary: Get risk trend timeline for a specific issue
      description: Returns the full risk score timeline for a Jira issue.
      produces:
        - application/json
      parameters:
        - name: issueKey
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Issue risk trend timeline
          schema:
            type: object
            properties:
              issueKey:
                type: string
              analysisCount:
                type: integer
              firstRiskScore:
                type: integer
              latestRiskScore:
                type: integer
              trend:
                type: string
              timeline:
                type: array
                items:
                  type: object

  /qa/api/v1/intelligence/reanalyzed:
    get:
      operationId: getReanalyzedIssues
      summary: Get most re-analyzed issues
      description: Returns Jira issues analyzed more than once, ordered by analysis count.
      produces:
        - application/json
      responses:
        '200':
          description: Re-analyzed issues
          schema:
            type: array
            items:
              type: object
              properties:
                issueKey:
                  type: string
                analysisCount:
                  type: integer

  /qa/api/v1/history/{issueKey}:
    get:
      operationId: getIssueHistory
      summary: Get analysis history for a Jira issue
      description: Returns all analysis records for a specific issue key.
      produces:
        - application/json
      parameters:
        - name: issueKey
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Analysis history
          schema:
            type: array
            items:
              $ref: '#/definitions/AnalysisRecord'

  /qa/api/v1/history:
    get:
      operationId: getRecentHistory
      summary: Get recent analyses
      description: Returns the last 10 analysis records.
      produces:
        - application/json
      responses:
        '200':
          description: Recent analysis records
          schema:
            type: array
            items:
              $ref: '#/definitions/AnalysisRecord'

  /qa/health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns service status, version, uptime, and intelligence summary.
      produces:
        - application/json
      responses:
        '200':
          description: Health status
          schema:
            type: object
            properties:
              status:
                type: string
              service:
                type: string
              version:
                type: string
              uptime:
                type: string
              intelligence:
                type: object

definitions:
  QaAnalyzeResponse:
    type: object
    properties:
      output:
        type: string
      analysis:
        $ref: '#/definitions/QaAnalysis'

  QaAnalysis:
    type: object
    properties:
      traceabilityId:
        type: string
      contractVersion:
        type: string
      analysisSummary:
        type: string
      requirementStatus:
        type: string
      featureSummary:
        type: string
      riskLevel:
        type: string
      riskScore:
        type: integer
      releaseRecommendation:
        type: string
      automationRecommendation:
        type: string
      stages:
        $ref: '#/definitions/QaStages'

  QaStages:
    type: object
    properties:
      requirement:
        $ref: '#/definitions/RequirementStage'
      testDesign:
        $ref: '#/definitions/TestDesignStage'
      automation:
        $ref: '#/definitions/AutomationStage'
      risk:
        $ref: '#/definitions/RiskStage'
      bugReport:
        $ref: '#/definitions/BugReportStage'

  RequirementStage:
    type: object
    properties:
      status:
        type: string
      featureSummary:
        type: string
      clarifiedRequirements:
        type: array
        items:
          type: string
      edgeCases:
        type: array
        items:
          type: string
      openQuestions:
        type: array
        items:
          type: string
      scope:
        type: array
        items:
          type: string
      outOfScope:
        type: array
        items:
          type: string

  TestDesignStage:
    type: object
    properties:
      testScenarios:
        type: array
        items:
          type: string
      testCases:
        type: array
        items:
          $ref: '#/definitions/TestCase'

  TestCase:
    type: object
    properties:
      id:
        type: string
      title:
        type: string
      preconditions:
        type: string
      steps:
        type: array
        items:
          type: string
      expectedResult:
        type: string
      testType:
        type: string
      suiteTag:
        type: string
      testData:
        type: string
      priority:
        type: string

  AutomationStage:
    type: object
    properties:
      automationRecommendation:
        type: string
      automationReasoning:
        type: string
      coverageSplit:
        type: string
      frameworkSuggestion:
        type: string

  RiskStage:
    type: object
    properties:
      riskScore:
        type: integer
      riskLevel:
        type: string
      riskReason:
        type: string
      topRiskDrivers:
        type: array
        items:
          type: string
      releaseRecommendation:
        type: string

  BugReportStage:
    type: object
    properties:
      title:
        type: string
      environment:
        type: string
      severity:
        type: string
      priority:
        type: string
      reproductionSteps:
        type: array
        items:
          type: string
      expectedResult:
        type: string
      actualResult:
        type: string
      impactSummary:
        type: string
      affectedAreas:
        type: array
        items:
          type: string
      suggestedAssignee:
        type: string

  AnalysisRecord:
    type: object
    properties:
      id:
        type: integer
      issueKey:
        type: string
      featureSummary:
        type: string
      requirementStatus:
        type: string
      riskLevel:
        type: string
      riskScore:
        type: integer
      releaseRecommendation:
        type: string
      automationRecommendation:
        type: string
      testCaseCount:
        type: integer
      analyzedAt:
        type: string
      pipelineDurationMs:
        type: integer
      completedAt:
        type: string
      releaseSummary:
        type: string

securityDefinitions: {}