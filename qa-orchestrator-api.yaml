swagger: '2.0'
info:
  title: QA Orchestrator API
  description: Runs QA analysis for a Jira issue and returns a JSON response.
  version: '1.0.0'

host: qa-orchestrator-service.onrender.com
basePath: /
schemes:
  - https

paths:
  /qa/run/{issueKey}:
    post:
      operationId: runQaAnalysis
      summary: Run QA analysis
      description: Runs QA analysis for the provided Jira issue key.
      produces:
        - application/json
      parameters:
        - name: issueKey
          in: path
          description: Jira issue key, for example PROJ-4
          required: true
          type: string
      responses:
        '200':
          description: QA analysis result
          schema:
            type: object
            required:
              - output
            properties:
              output:
                type: string
                description: QA analysis result text